# cargo-deny configuration for supply chain security (v2 schema)
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# With version = 2, vulnerabilities and unsound advisories are always denied.
yanked = "warn"

# Transitive through netlink-packet-utils. The advisory is unmaintained-only,
# has no safe upgrade, and the dependency is needed for sock_diag support.
ignore = [
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# With version = 2, any license not explicitly allowed is denied.
# This list is derived from the actual dependency tree (Cargo.lock):
allow = [
    "MIT",                             # majority of the tree (gtk4-rs bindings, tokio, ...)
    "Apache-2.0",                      # sync_wrapper, ring (Apache-2.0 AND ISC), dual-licensed crates
    "Apache-2.0 WITH LLVM-exception",  # target-lexicon, rustix/linux-raw-sys/wasi
    "BSD-2-Clause",                    # zerocopy (BSD-2-Clause OR Apache-2.0 OR MIT)
    "BSD-3-Clause",                    # subtle
    "ISC",                             # ring, rustls-webpki, untrusted
    "Unicode-3.0",                     # unicode-ident, icu_* / zerovec / tinystr (ICU4X)
    "Zlib",                            # foldhash
    "MPL-2.0",                         # option-ext (via dirs -> dirs-sys)
    "CDLA-Permissive-2.0",             # webpki-roots 1.x
]

# Confidence threshold for license detection
confidence-threshold = 0.8

[licenses.private]
# Private crates don't need to match licenses
ignore = true

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate is detected with a wildcard version
wildcards = "deny"
# Allow specific crates to have multiple versions
skip = [
    # Often has multiple versions due to ecosystem fragmentation
    # { name = "syn", version = "*" },
]
# Deny specific crates
deny = [
    # Example: { name = "openssl", wrappers = ["openssl"] },
]

# NOTE: the previous [bans.build] allow-build-scripts list was removed: when set,
# cargo-deny errors on *every* crate with a build script that is not listed, and
# this tree has dozens of legitimate ones (libc, serde, ring, proc-macro2, ...).

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# Allow only crates.io (git and sparse index forms)
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    "sparse+https://index.crates.io/",
]
# Allow specific git repositories if needed
# allow-git = []

[sources.allow-org]
# Allow all crates from specific organizations
github = []
