name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-deb:
    name: Build .deb (Ubuntu)
    runs-on: ubuntu-latest
    # Ubuntu 24.04 LTS ships GTK 4.14 / libadwaita 1.5, matching the crate
    # feature flags (gtk4 "v4_14", libadwaita "v1_5").
    container: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config curl ca-certificates git \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev libdbus-1-dev

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build release binary
        run: cargo build --release

      - name: Build .deb package
        run: bash scripts/package-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/deb/*.deb
          if-no-files-found: error

  build-rpm:
    name: Build .rpm (Fedora)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make pkgconf-pkg-config git-core rpm-build \
            gtk4-devel libadwaita-devel glib2-devel dbus-devel

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-generate-rpm
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Build .rpm package
        run: bash scripts/package-rpm.sh

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: dist/rpm/*.rpm
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm]
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum *.deb *.rpm > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
          generate_release_notes: true
